<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">MRI Brain Tumor Detection – Result</h1>

    <div class="card shadow-sm">
        <div class="card-header">
            <h4 class="mb-0">Patient Summary</h4>
        </div>
        <div class="card-body">
            <p><strong>Patient Name:</strong> {{ patient_name }}</p>
            <p><strong>Patient ID:</strong> {{ patient_id }}</p>
            <p><strong>Age:</strong> {{ age }}</p>
            <p><strong>Doctor:</strong> {{ doctor }}</p>
        </div>
    </div>

    <div class="card shadow-sm mt-4">
        <div class="card-header">
            <h4 class="mb-0">Prediction</h4>
        </div>
        <div class="card-body">
            <p class="fs-4 mb-1"><strong>Tumor Type:</strong> {{ prediction }}</p>
            <p><strong>Confidence:</strong> {{ confidence }}%</p>

            <div class="mt-3">
    <a href="/download_pdf" class="btn btn-outline-primary">
        Download PDF Report
    </a>
</div>

        </div>
    </div>
</div>

</body>
</html>
